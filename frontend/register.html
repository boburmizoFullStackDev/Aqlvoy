<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ro'yxatdan o'tish | AQLVOY — 3D aqlli ta'lim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #050E2A 0%, #0D2057 25%, #051332 50%, #0a1c4f 75%, #050E2A 100%);
            background-size: 400% 400%;
            animation: bgShift 20s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        @keyframes bgShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        /* 3D fon effektlari */
        
        .bg-3d-effects {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }
        
        .globe-background {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(6, 182, 212, 0.15) 0%, rgba(26, 86, 219, 0.05) 100%);
            animation: rotateSlow 30s linear infinite;
        }
        
        @keyframes rotateSlow {
            0%,
            100% {
                transform: rotate(0deg) scale(1);
            }
            50% {
                transform: rotate(180deg) scale(1.1);
            }
        }
        
        .globe-1 {
            top: -200px;
            left: -200px;
        }
        
        .globe-2 {
            bottom: -300px;
            right: -300px;
            animation: rotateSlow 40s linear infinite reverse;
            opacity: 0.6;
        }
        
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
        }
        
        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.2), transparent);
            top: 10%;
            right: 10%;
            animation: orbFloat 12s ease-in-out infinite;
        }
        
        .orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15), transparent);
            bottom: 20%;
            left: 5%;
            animation: orbFloat 15s ease-in-out infinite reverse;
        }
        
        @keyframes orbFloat {
            0%,
            100% {
                transform: translate(0, 0);
            }
            25% {
                transform: translate(50px, -30px);
            }
            50% {
                transform: translate(0, -60px);
            }
            75% {
                transform: translate(-50px, -30px);
            }
        }
        
        .register-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 10;
        }
        
        .register-container {
            max-width: 520px;
            margin: 0 auto;
            width: 100%;
        }
        /* Asosiy karta */
        
        .register-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
            padding: 42px 38px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15), 0 0 60px rgba(6, 182, 212, 0.1);
            position: relative;
            width: 100%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform-style: preserve-3d;
            animation: cardSlideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            transition: transform 0.2s ease-out;
        }
        
        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateY(40px) translateZ(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0) translateZ(0);
            }
        }
        /* Yuqori qism: rasm + AQLVOY matni yonma-yon */
        
        .modal-logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .modal-logo-row img {
            height: 100px;
            width: auto;
            object-fit: contain;
        }
        
        .logo-text {
            font-family: 'Baloo 2', cursive;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(125deg, #0F2B6D, #1E3A8A, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .modal-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #0A0F2C;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .modal-sub {
            font-size: 0.9rem;
            color: #4b5563;
            margin-bottom: 28px;
            border-left: 4px solid #06b6d4;
            padding-left: 14px;
        }
        
        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #1f2937;
            margin-bottom: 6px;
            margin-top: 16px;
        }
        
        .form-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 0.95rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 18px;
            background: #ffffff;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
            font-weight: 500;
        }
        
        .form-input:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.15);
            transform: translateY(-3px) scale(1.01);
        }
        
        .pass-wrap {
            position: relative;
        }
        
        .pass-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #6c757d;
            transition: 0.2s;
        }
        
        .pass-toggle:hover {
            color: #06b6d4;
        }
        
        .step-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 24px;
        }
        
        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            background: #e5e7eb;
            color: #6b7280;
            transition: all 0.3s;
        }
        
        .step.active {
            background: linear-gradient(135deg, #06b6d4, #1a56db);
            color: white;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }
        
        .step.done {
            background: #10b981;
            color: white;
        }
        
        .step-line {
            flex: 1;
            height: 3px;
            background: #e5e7eb;
            border-radius: 3px;
            transition: background 0.3s;
        }
        
        .step-line.done {
            background: #10b981;
        }
        
        .role-btns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        
        .role-btn {
            padding: 16px 8px;
            border-radius: 18px;
            border: 2px solid #e5e7eb;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .role-btn:hover {
            transform: translateY(-4px);
            border-color: #06b6d4;
        }
        
        .role-btn.selected {
            border-color: #06b6d4;
            background: rgba(6, 182, 212, 0.08);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }
        
        .role-btn .icon {
            font-size: 1.8rem;
            margin-bottom: 6px;
        }
        
        .role-btn .label {
            font-size: 0.8rem;
            font-weight: 700;
        }
        
        .btn-modal-submit,
        .btn-submit {
            width: 100%;
            background: linear-gradient(105deg, #0F2B6D, #1E3A8A);
            border: none;
            padding: 15px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1rem;
            color: white;
            margin-top: 22px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
        }
        
        .btn-modal-submit:hover,
        .btn-submit:hover {
            background: linear-gradient(105deg, #1E3A8A, #2563eb);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 28px -8px #1e3a8a;
        }
        
        .btn-back {
            background: #eef2ff;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 700;
            color: #1e3a8a;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .btn-back:hover {
            background: #e0e7ff;
            transform: translateX(-3px);
        }
        
        .btn-telegram {
            width: 100%;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            padding: 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
            color: #1e293b;
        }
        
        .btn-telegram:hover {
            background: white;
            border-color: #06b6d4;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.15);
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 18px;
        }
        
        .divider hr {
            flex: 1;
            border: none;
            height: 1.5px;
            background: #e2e8f0;
        }
        
        .divider span {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 600;
        }
        
        .modal-switch {
            text-align: center;
            font-size: 0.85rem;
            margin-top: 20px;
            color: #334155;
        }
        
        .modal-switch a {
            color: #1E3A8A;
            font-weight: 800;
            text-decoration: none;
            transition: 0.2s;
        }
        
        .modal-switch a:hover {
            color: #06b6d4;
            text-decoration: underline;
        }
        
        .terms-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0 18px;
            font-size: 0.8rem;
        }
        
        .terms-row input {
            width: 18px;
            height: 18px;
            accent-color: #06b6d4;
        }
        
        .terms-row a {
            color: #1e3a8a;
            text-decoration: none;
            font-weight: 600;
        }
        
        .modal-btns {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        
        .back-home {
            text-align: center;
            margin-top: 24px;
        }
        
        .back-home a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.85);
            background: rgba(15, 25, 45, 0.55);
            backdrop-filter: blur(8px);
            padding: 8px 24px;
            border-radius: 60px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid rgba(6, 182, 212, 0.3);
        }
        
        .back-home a:hover {
            background: #1e3a8acc;
            color: white;
            transform: translateX(-5px);
            border-color: #22d3ee;
        }
        
        @media (max-width: 550px) {
            .register-card {
                padding: 32px 24px;
            }
            .modal-title {
                font-size: 1.6rem;
            }
            .modal-logo-row img {
                height: 45px;
            }
            .logo-text {
                font-size: 1.6rem;
            }
            .role-btns {
                gap: 8px;
            }
            .role-btn .icon {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-3d-effects">
        <div class="globe-background globe-1"></div>
        <div class="globe-background globe-2"></div>
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
    </div>

    <div class="register-wrapper">
        <div class="register-container">
            <div class="register-card" id="registerCard">
                <!-- Rasm + AQLVOY matni yonma-yon -->
                <div class="modal-logo-row">
                    <img src="image.png" alt="AQLVOY" onerror="this.style.display='none'">
                    <span class="logo-text">AQLVOY</span>
                </div>

                <!-- Step 1 -->
                <div id="step1">
                    <h2 class="modal-title">Boshlaylik! 🚀</h2>
                    <p class="modal-sub">Bepul hisob oching va bugunoq o'rganishni boshlang</p>

                    <div class="step-indicator">
                        <div class="step active" id="step1-indicator">1</div>
                        <div class="step-line" id="line1"></div>
                        <div class="step" id="step2-indicator">2</div>
                    </div>

                    <label class="form-label">Ism</label>
                    <input type="text" class="form-input" id="reg-name" placeholder="Ismingizni kiriting">

                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="reg-email" placeholder="email@example.com">

                    <label class="form-label">Parol</label>
                    <div class="pass-wrap">
                        <input type="password" class="form-input" id="reg-pass" placeholder="Kamida 6 belgi">
                        <button type="button" class="pass-toggle" onclick="togglePass('reg-pass')">👁</button>
                    </div>

                    <label class="form-label">Parolni tasdiqlash</label>
                    <div class="pass-wrap">
                        <input type="password" class="form-input" id="reg-pass2" placeholder="Parolni qayta kiriting">
                        <button type="button" class="pass-toggle" onclick="togglePass('reg-pass2')">👁</button>
                    </div>

                    <button class="btn-modal-submit" onclick="goToStep2()">Davom etish →</button>

                    <div class="divider">
                        <hr><span>yoki</span>
                        <hr>
                    </div>

                    <button class="btn-telegram" onclick="telegramRegister()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="#229ED9"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248l-2.012 9.488c-.152.668-.553.831-1.12.516l-3.08-2.27-1.485 1.43c-.164.165-.303.303-.621.303l.221-3.138 5.718-5.166c.249-.22-.054-.343-.384-.122L7.28 14.565l-3.03-.946c-.659-.206-.672-.659.138-.975l11.835-4.563c.549-.2 1.028.134.84.967h-.501z"/></svg>
                    Telegram orqali ro'yxatdan o'tish
                </button>

                    <div class="modal-switch">Hisob bormi? <a href="login.html">Kirish</a></div>
                </div>

                <!-- Step 2 - Role Selection -->
                <div id="step2" style="display:none">
                    <h2 class="modal-title">Rolingizni tanlang 🎯</h2>
                    <p class="modal-sub">Platformadan qanday foydalanmoqchisiz?</p>

                    <div class="step-indicator">
                        <div class="step done" id="step1-indicator2">✓</div>
                        <div class="step-line done" id="line2"></div>
                        <div class="step active" id="step2-indicator2">2</div>
                    </div>

                    <div class="role-btns">
                        <div class="role-btn" onclick="selectRole('student', this)">
                            <div class="icon">🎓</div>
                            <div class="label">O'quvchi</div>
                        </div>
                        <div class="role-btn" onclick="selectRole('teacher', this)">
                            <div class="icon">👨‍🏫</div>
                            <div class="label">O'qituvchi</div>
                        </div>
                        <div class="role-btn" onclick="selectRole('parent', this)">
                            <div class="icon">👨‍👩‍👧</div>
                            <div class="label">Ota-ona</div>
                        </div>
                    </div>

                    <div id="student-fields" style="display:none">
                        <label class="form-label">Sinf</label>
                        <select class="form-input" id="student-class">
                        <option>1-sinf</option><option>2-sinf</option><option>3-sinf</option>
                        <option>4-sinf</option>
                    </select>
                    </div>

                    <div id="teacher-fields" style="display:none">
                        <label class="form-label">Qaysi fandan o'qitasiz?</label>
                        <select class="form-input" id="teacher-subject">
                        <option>Matematika</option><option>Fizika</option><option>Kimyo</option>
                        <option>Biologiya</option><option>Ingliz tili</option><option>Tarix</option>
                    </select>
                        <label class="form-label" style="margin-top:12px">Tajriba (yil)</label>
                        <select class="form-input" id="teacher-exp">
                        <option>1-3 yil</option><option>3-5 yil</option><option>5-10 yil</option><option>10+ yil</option>
                    </select>
                    </div>

                    <div id="parent-fields" style="display:none">
                        <label class="form-label">Farzandingiz ismi</label>
                        <input type="text" class="form-input" id="child-name" placeholder="Farzandingizning ismi">
                        <label class="form-label" style="margin-top:12px">Farzandingizning sinfi</label>
                        <select class="form-input" id="child-class">
                        <option>1-sinf</option><option>2-sinf</option><option>3-sinf</option>
                        <option>4-sinf</option>
                    </select>
                    </div>

                    <div class="terms-row">
                        <input type="checkbox" id="terms-checkbox">
                        <label><a href="#">Foydalanish shartlari</a> va <a href="#">Maxfiylik siyosati</a>ga roziman</label>
                    </div>

                    <div class="modal-btns">
                        <button class="btn-back" onclick="goToStep1()">← Orqaga</button>
                        <button class="btn-submit" onclick="completeRegistration()">Ro'yxatdan o'tish 🎉</button>
                    </div>
                </div>
            </div>

            <!-- Bosh sahifaga qaytish - pastda -->
            <div class="back-home">
                <a href="index.html">← Bosh sahifaga qaytish</a>
            </div>
        </div>
    </div>

    <script>
    let selectedRole = null;
    let regUserName = '';
    let regUserEmail = '';

    function togglePass(id) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    function goToStep2() {
        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const pass = document.getElementById('reg-pass').value;
        const pass2 = document.getElementById('reg-pass2').value;

        if (!name) {
            alert('Ismingizni kiriting');
            return;
        }
        if (!email || !email.includes('@')) {
            alert("Email noto\'g\'ri");
            return;
        }
        if (pass.length < 6) {
            alert('Parol kamida 6 belgi');
            return;
        }
        if (pass !== pass2) {
            alert('Parollar mos kelmadi');
            return;
        }

        regUserName = name;
        regUserEmail = email;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
    }

    function goToStep1() {
        document.getElementById('step1').style.display = 'block';
        document.getElementById('step2').style.display = 'none';
        selectedRole = null;
        document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('selected'));
        document.getElementById('student-fields').style.display = 'none';
        document.getElementById('teacher-fields').style.display = 'none';
        document.getElementById('parent-fields').style.display = 'none';
    }

    function selectRole(role, btnElement) {
        selectedRole = role;
        document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('selected'));
        btnElement.classList.add('selected');
        document.getElementById('student-fields').style.display = role === 'student' ? 'block' : 'none';
        document.getElementById('teacher-fields').style.display = role === 'teacher' ? 'block' : 'none';
        document.getElementById('parent-fields').style.display = role === 'parent' ? 'block' : 'none';
    }

    async function completeRegistration() {
        if (!selectedRole) {
            alert('Rolingizni tanlang');
            return;
        }
        const terms = document.getElementById('terms-checkbox').checked;
        if (!terms) {
            alert('Foydalanish shartlariga rozilik bering');
            return;
        }

        const payload = {
            name: regUserName,
            email: regUserEmail,
            password: document.getElementById('reg-pass').value,
            role: selectedRole,
            student_class: selectedRole === 'student' ? document.getElementById('student-class').value : null,
            teacher_subject: selectedRole === 'teacher' ? document.getElementById('teacher-subject').value : null,
            teacher_exp: selectedRole === 'teacher' ? document.getElementById('teacher-exp').value : null,
            child_name: selectedRole === 'parent' ? (document.getElementById('child-name').value.trim() || 'Farzand') : null,
            child_class: selectedRole === 'parent' ? document.getElementById('child-class').value : null,
        };

        const submitBtn = document.querySelector('#step2 .btn-submit');
        const originalText = submitBtn.innerText;
        submitBtn.innerText = 'Yuborilmoqda...';
        submitBtn.disabled = true;

        try {
            const response = await apiRequest('/api/auth/register', {
                method: 'POST',
                body: JSON.stringify(payload),
            });
            persistUserSession(response.user);
            window.location.href = routeForRole(response.user.role);
        } catch (error) {
            alert(error.message);
        } finally {
            submitBtn.innerText = originalText;
            submitBtn.disabled = false;
        }
    }

    function telegramRegister() {
        window.open('https://t.me/aqlvoyai', '_blank');
        alert("Telegram botimiz orqali tezda ro'yxatdan o'tishingiz mumkin!");
    }
</script>
<script src="app-api.js"></script>
</body>

</html>
